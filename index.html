<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Wisdom — a quote a day</title>
  <meta name="description" content="One quote a day on life, happiness, success, wealth, health, and wellbeing.">

  <!-- Site-wide Open Graph / Twitter card (per-quote cards live under /q/). -->
  <meta property="og:site_name" content="Daily Wisdom">
  <meta property="og:title" content="Daily Wisdom — a quote a day">
  <meta property="og:description" content="One quote a day on life, happiness, success, wealth, health, and wellbeing.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://psparmeet14.github.io/daily-quotes/">
  <meta property="og:image" content="https://psparmeet14.github.io/daily-quotes/og-default.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Daily Wisdom — a quote a day">
  <meta name="twitter:description" content="One quote a day on life, happiness, success, wealth, health, and wellbeing.">
  <meta name="twitter:image" content="https://psparmeet14.github.io/daily-quotes/og-default.png">

  <!-- Set theme before paint to avoid a flash. -->
  <script>
    (function () {
      try {
        var s = localStorage.getItem("dw-theme");
        var dark = s === "dark" || (s !== "light" &&
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand"><a href="./">Daily Wisdom</a></div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">☾</button>
    </header>

    <nav class="nav">
      <button id="nav-today" type="button" class="active">Today</button>
      <button id="nav-archive" type="button">Archive</button>
      <button id="nav-random" type="button">⤳ Random</button>
    </nav>

    <main id="main" class="main">
      <!-- Quote view -->
      <section id="quote-view" class="quote-view" aria-label="Quote">
        <div class="quote-meta">
          <span id="date-label"></span>
          <span id="clock" hidden>
            <span class="dot">·</span>
            <span class="time" id="time"></span>
          </span>
        </div>
        <div id="quote-num" class="quote-num"></div>
        <blockquote id="quote-text" class="quote-text"></blockquote>
        <div id="quote-author" class="quote-author"></div>
        <p id="quote-desc" class="quote-desc"></p>
        <img id="quote-image" class="quote-image" hidden alt="">
        <div class="actions">
          <button id="like-btn" class="like-btn" type="button" aria-label="Like this quote">
            <span class="heart">♥</span>
            <span id="like-count" class="count">0</span>
            <span id="plus-one" class="plus-one" hidden>+1</span>
          </button>
          <button id="share-btn" class="share-btn" type="button" aria-label="Copy link to this quote">Share</button>
        </div>
      </section>

      <!-- Archive view -->
      <section id="archive-view" class="archive-view" aria-label="Archive" hidden>
        <h2 class="archive-title">Archive</h2>
        <div id="archive-grid" class="archive-grid"></div>
      </section>
    </main>

    <footer class="footer">One quote a day, since <span id="since-label">today</span></footer>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
